<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-nav">
                <div class="sidebar-link active" id="nav-home">
                    <div class="sidebar-link-icon">
                        <i class="fa-solid fa-house"></i>
                    </div>
                    <div class="sidebar-link-text">Home</div>
                </div>
                <div class="sidebar-link" id="nav-search">
                    <div class="sidebar-link-icon">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <div class="sidebar-link-text">Search</div>
                </div>
            </div>

            <div class="sidebar-library">
                <div class="library-header">
                    <div class="library-header-left">
                        <i class="fa-solid fa-book-open"></i>
                        <span>Your Library</span>
                    </div>
                    <div class="library-header-right">
                        <i class="fa-solid fa-plus" id="add-playlist-btn"></i>
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                </div>

                <div class="library-filter">
                    <span class="pill active">Playlists</span>
                    <span class="pill">Artists</span>
                    <span class="pill">Albums</span>
                </div>

                <div class="library-content" id="library-content">
                    <!-- Javascript will populate playlists here -->
                    <div class="library-item">
                        <div class="library-img placeholder-img">
                            <i class="fa-solid fa-heart"></i>
                        </div>
                        <div class="library-info">
                            <div class="library-name">Liked Songs</div>
                            <div class="library-desc">Playlist • 325 songs</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="nav-controls">
                    <div class="nav-btn prev disabled"><i class="fa-solid fa-chevron-left"></i></div>
                    <div class="nav-btn next disabled"><i class="fa-solid fa-chevron-right"></i></div>
                    <div class="search-container">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="What do you want to play?" id="search-input">
                    </div>
                </div>
                <div class="user-controls">
                    <button class="upgrade-btn">Explore Premium</button>
                    <button class="install-btn"><i class="fa-regular fa-circle-down"></i> Install App</button>
                    <div class="user-menu" id="user-menu-btn">
                        <i class="fa-regular fa-bell"></i>
                        <div class="user-avatar" id="user-avatar">S</div>
                        <div class="user-dropdown" id="user-dropdown">
                            <ul>
                                <li>Account</li>
                                <li>Profile</li>
                                <li id="login-logout-btn">Log out</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-scroll">
                <!-- Home View -->
                <div id="home-view" class="view-section active">
                    <section class="section-greeting">
                        <h2>Good morning</h2>
                        <div class="greeting-grid" id="greeting-grid">
                            <!-- Javascript will populate greeting items -->
                        </div>
                    </section>

                    <section class="section-recent">
                        <div class="section-header">
                            <h2>Recently played</h2>
                            <a href="#">Show all</a>
                        </div>
                        <div class="cards-container" id="recent-cards">
                            <!-- Javascript will populate cards -->
                        </div>
                    </section>

                    <section class="section-made-for-you">
                        <div class="section-header">
                            <h2>Made For You</h2>
                            <a href="#">Show all</a>
                        </div>
                        <div class="cards-container" id="made-for-you-cards">
                            <!-- Javascript will populate cards -->
                        </div>
                    </section>
                </div>

                <!-- Search View (Browse) -->
                <div id="search-view" class="view-section">
                    <section class="section-browse">
                        <h2>Browse all</h2>
                        <div class="category-grid" id="category-grid">
                            <!-- Javascript will populate categories -->
                        </div>
                    </section>
                </div>
            </div>
        </main>

        <!-- Accessing Rights Panel (optional, maybe skip for simplicity) -->
    </div>

    <!-- Player Footer -->
    <div class="player-bar">
        <div class="player-left">
            <img src="https://via.placeholder.com/56" alt="Album Art" class="now-playing-img" id="now-playing-img">
            <div class="now-playing-info">
                <div class="now-playing-title" id="now-playing-title">No Song Playing</div>
                <div class="now-playing-artist" id="now-playing-artist">Select a song</div>
            </div>
            <i class="fa-regular fa-heart like-btn"></i>
        </div>

        <div class="player-center">
            <div class="player-controls">
                <button class="control-btn shuffle"><i class="fa-solid fa-shuffle"></i></button>
                <button class="control-btn specific-prev"><i class="fa-solid fa-backward-step"></i></button>
                <button class="control-btn play-pause big" id="play-pause-btn"><i
                        class="fa-solid fa-circle-play"></i></button> <!-- Play icon -->
                <button class="control-btn specific-next"><i class="fa-solid fa-forward-step"></i></button>
                <button class="control-btn repeat"><i class="fa-solid fa-repeat"></i></button>
            </div>
            <div class="playback-bar">
                <span class="curr-time" id="curr-time">0:00</span>
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <span class="tot-time" id="tot-time">0:00</span>
            </div>
        </div>

        <div class="player-right">
            <i class="fa-solid fa-microphone-lines control-icon"></i> <!-- Lyrics -->
            <i class="fa-solid fa-list control-icon"></i> <!-- Queue -->
            <i class="fa-solid fa-computer control-icon"></i> <!-- Connect -->
            <div class="volume-control">
                <i class="fa-solid fa-volume-high control-icon" id="volume-icon"></i>
                <div class="volume-slider-container">
                    <div class="volume-slider"></div>
                </div>
            </div>
            <i class="fa-solid fa-up-right-and-down-left-from-center control-icon"></i> <!-- Fullscreen -->
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
